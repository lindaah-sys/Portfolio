
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
    
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  overflow-x: hidden;
}


header {
  background: linear-gradient(
    110deg,
    #7FC0DE 59.5%,
    #4DAD6A 50%
  );
  padding: 10px;
  display: flex;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

nav ul {
  display: flex;
  align-items: center;
  gap: 25px;
  list-style: none;
}

.logo {
  font-weight: bold;
  margin-right: auto;
}

nav a {
  text-decoration: none;
  color: black;
}
      .home {
  height: 100vh;
  display: flex;
  position: relative;
}


.home::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(110deg, #7FC0DE 50%, #4DAD6A 50%);
  z-index: -1;
}


.left {
  width: 50%;
  padding: 60px;
  position: relative;
}


.right {
  width: 50%;
  position: relative;
}

.intro-card {
  background: rgba(255,255,255,0.3); /* FIXED */
  padding: 25px;
  border-radius: 12px;
  width: 80%;
  margin-top: 100px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}


.profile {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  position: absolute;
  top: 120px;
  left: 80px;
  object-fit: cover;
}


.btn {
  padding: 10px 25px;
  border-radius: 20px;
  border: none;
  background: #1f7a7a;
  color: white;
  cursor: pointer;
}


.contact-btn {
  position: absolute;
  bottom: 140px;
  left: 60px;
}

.work-btn {
  position: absolute;
  bottom: 140px;
  left: 100px;
}


.info {
  position: absolute;
  bottom: 40px;
  left: 60px;
}

.right-info {
  left: 100px;
}


.item {
  display: flex;
  gap: 10px;
  margin: 10px 0;
  align-items: center;
}
</style>
</head>
<body>

<header>
  <nav>
    <ul>
      <li class="logo">Portifolio</li>
      <li><a href="#">Home</a></li>
      <li><a href="#">Skills</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">About us</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="home">
  <div class="left">
    
    <div class="intro-card">
      <p>
        Hello 👋, welcome to my portfolio.<br>
        I am Linda, a Software Development trainee
        passionate about building simple and effective
        digital solutions.
      </p>
    </div>

    <button class="btn contact-btn">Contact me</button>

    <div class="info">
      <div class="item"><img src="assets/email.png" width="20" height="20"> tetalinda35@gmail.com</div>
      <div class="item"><img src="assets/phone.png" width="20" height="20"> 789654800</div>
      <div class="item"><img src="assets/twitter.png" width="20" height="20"> Teta@250</div>
    </div>

  </div>

  
  <div class="right">

    <img src="assets/L.jpeg" class="profile">

    <button class="btn work-btn">View my work</button>

    <div class="info right-info">
      <div class="item"><img src="assets/location.png" width="20" height="20"> Kigali, Rwanda</div>
      <div class="item"><img src="assets/mail.png" width="20" height="20"> tetalinda35@gmail.com</div>
    </div>

  </div>

</section>
  </body>
</html>
