<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Positioning Demo</title>
<style>
body {
margin: 0;
position: relative;
height: 100vh;
}
.parent {
position: relative;

width: 100%;
height: 300px;
border: 1px solid black;
overflow: hidden;
}
.corner {
    position: absolute;

    top: 50%;
    left: 50%;

    width: 100px;
    height: 100px;
    background: orange;

    transform: translate(-50%, -50%) rotate(45deg);
}
</style>
</head>
<body>
<div class="parent">
<div class="corner"></div>
</div>
</body>
</html>
